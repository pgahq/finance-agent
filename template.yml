AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Finance AI Automation for Workday

Parameters:
  LogLevel:
    Type: String
    Description: Logger Log Level
    Default: DEBUG
  WorkdayDomain:
    Type: String
    Description: Workday domain hostname
  WorkdayTenant:
    Type: String
    Description: Workday tenant identifier
  FallbackFundId:
    Type: String
    Description: Workday WID for the fallback fund
  FallbackPaymentTermsId:
    Type: String
    Description: Workday WID for the fallback payment terms
  FallbackCostCenterId:
    Type: String
    Description: Workday WID for the fallback cost center
  InvoiceModEnabled:
    Type: String
    Description: Whether to enable invoice modification
    Default: "false"
  DefaultOcrSpendCategoryId:
    Type: String
    Description: Workday Spend_Category_ID to apply as fallback for OCR lines missing a spend category

Globals:
  Function:
    Runtime: nodejs24.x
    CodeUri: .
    MemorySize: 1024
    Timeout: 600
    Environment:
      Variables:
        LOG_LEVEL: !Ref LogLevel
        WORKDAY_DOMAIN: !Ref WorkdayDomain
        WORKDAY_TENANT: !Ref WorkdayTenant
        WORKDAY_CLIENT_ID: ssm:/finance-agent/workday-client-id
        WORKDAY_CLIENT_SECRET: ssm:/finance-agent/workday-client-secret
        WORKDAY_REFRESH_TOKEN: ssm:/finance-agent/workday-refresh-token
        WORKDAY_AGENT_MODIFIED_TAG_WID: FINAGENT-invoice-modified
        WORKDAY_DEFAULT_SUPPLIER_WID: 29ce29920bac1001634359c103bb0000
        FALLBACK_FUND_ID: !Ref FallbackFundId
        FALLBACK_PAYMENT_TERMS_ID: !Ref FallbackPaymentTermsId
        FALLBACK_COST_CENTER_ID: !Ref FallbackCostCenterId
        INVOICE_MOD_ENABLED: !Ref InvoiceModEnabled
        FALLBACK_SPEND_CATEGORY_ID: !Ref DefaultOcrSpendCategoryId
        OPENAI_API_KEY: ssm:/finance-agent/openai-api-key
        SLACK_WEBHOOK_URL: ssm:/finance-agent/slack-webhook-url
        S3_BUCKET_NAME: !Ref FinanceAgentBucket
        AWS_STACK_NAME: !Ref AWS::StackName
        DATABASE_SECRET_ARN: !Ref DatabaseSecret
        DATABASE_CLUSTER_ENDPOINT: !GetAtt FinanceAgentDatabase.Endpoint.Address
        DATABASE_NAME: finance_agent

Resources:
  FinanceAgentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub finance-agent-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  InvoiceValidationFailuresTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-invoice-validation-failures"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: invoiceWorkdayID
          AttributeType: S
      KeySchema:
        - AttributeName: invoiceWorkdayID
          KeyType: HASH

  # Database Secret for password management
  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-database-secret"
      Description: "Secret for PostgreSQL RDS user instance"
      GenerateSecretString:
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'

  # Aurora Serverless PostgreSQL Cluster
  FinanceAgentDatabase:
    Type: AWS::RDS::DBCluster
    Properties:
      DBClusterIdentifier: !Sub "${AWS::StackName}-db-cluster"
      Engine: aurora-postgresql
      EngineVersion: 15.12
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0.5
        MaxCapacity: 1.0
      DatabaseName: finance_agent
      MasterUsername: postgres
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DatabaseSecret}:SecretString:::}}"
      VpcSecurityGroupIds:
        - !Ref DatabaseSecurityGroup
      DBSubnetGroupName: !Ref FinanceAgentSubnetGroup
      Port: 5432

  # Aurora Serverless PostgreSQL Instance
  FinanceAgentDatabaseInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref FinanceAgentDatabase
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: false

  # Use existing VPC infrastructure from pgagent stack
  FinanceAgentSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Finance Agent database
      SubnetIds:
        - !ImportValue pgagent-private-subnet-id-1
        - !ImportValue pgagent-private-subnet-id-2

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Finance Agent Lambda functions
      VpcId: !ImportValue pgagent-vpc-id
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Finance Agent database
      VpcId: !ImportValue pgagent-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  FinanceAgentLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FinanceAgentLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource:
                  - arn:aws:ssm:*:*:parameter/finance-agent/*
                  - arn:aws:ssm:*:*:parameter/ap-ingest-service/workday-isu-user
                  - arn:aws:ssm:*:*:parameter/ap-ingest-service/workday-isu-password
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatabaseSecret
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub arn:aws:s3:::${FinanceAgentBucket}/*
                  - !Sub arn:aws:s3:::${FinanceAgentBucket}
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:finance-agent-*
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                Resource: "*"

  EnrichInvoiceProcessorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EnrichInvoiceProcessorPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource:
                  - arn:aws:ssm:*:*:parameter/finance-agent/*
                  - arn:aws:ssm:*:*:parameter/ap-ingest-service/workday-isu-user
                  - arn:aws:ssm:*:*:parameter/ap-ingest-service/workday-isu-password
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DatabaseSecret
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub arn:aws:s3:::${FinanceAgentBucket}/*
                  - !Sub arn:aws:s3:::${FinanceAgentBucket}
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:finance-agent-*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource: !GetAtt InvoiceValidationFailuresTable.Arn
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                Resource: "*"

  # RAG Documents - Query Retrieval
  RetrievalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-Retrieval"
      Handler: dist/query_documents.handler
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2

  # Cache Validation Rules - Single handler (no processor needed)
  CacheValidationRulesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CacheValidationRules"
      Handler: dist/cache_validation_rules.handler
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      Timeout: 120
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 11 * * ? *)

  # Cache Cost Centers - Query handler
  CacheCostCentersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CacheCostCenters"
      Handler: dist/cache_cost_centers.handler
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(59 11 * * ? *)

  # Cache Cost Centers Processor - Data processing
  CacheCostCentersProcessor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CacheCostCentersProcessor"
      Handler: dist/cache_cost_centers.processor
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      Timeout: 900
      MemorySize: 1024
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2

  # Cache Companies - Query handler
  CacheCompaniesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CacheCompanies"
      Handler: dist/cache_companies.handler
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(59 11 * * ? *)

  # Cache Companies Processor - Data processing
  CacheCompaniesProcessor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CacheCompaniesProcessor"
      Handler: dist/cache_companies.processor
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      Timeout: 900
      MemorySize: 1024
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2

  # Cache Suppliers - Query handler
  CacheSuppliersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CacheSuppliers"
      Handler: dist/cache_suppliers.handler
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 12 * * ? *)

  # Cache Suppliers Processor - Data processing
  CacheSuppliersProcessor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CacheSuppliersProcessor"
      Handler: dist/cache_suppliers.processor
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      Timeout: 900 # 15 minutes for processing
      MemorySize: 1024
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2

  # Refresh Suppliers - Full rebuild with pagination
  RefreshSuppliersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-RefreshSuppliers"
      Handler: dist/refresh_suppliers.handler
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      Timeout: 300 # 5 minutes for orchestration only
      MemorySize: 1024
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2

  # Enrich Invoice Supplier - Query handler
  EnrichInvoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-EnrichInvoice"
      Handler: dist/enrich_invoice.handler
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 * * * ? *)

  # Enrich Invoice Supplier Processor - Individual record processing
  EnrichInvoiceProcessor:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-EnrichInvoiceProcessor"
      Handler: dist/enrich_invoice.processor
      Role: !GetAtt EnrichInvoiceProcessorRole.Arn
      Timeout: 300 # 5 minutes for single invoice
      MemorySize: 1024
      Environment:
        Variables:
          INVOICE_VALIDATION_FAILURES_TABLE_NAME: !Ref InvoiceValidationFailuresTable
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue pgagent-private-subnet-id-1
          - !ImportValue pgagent-private-subnet-id-2
