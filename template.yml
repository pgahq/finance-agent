AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Finance AI Automation for Workday

Parameters:
  LogLevel:
    Type: String
    Description: Logger Log Level
    Default: DEBUG

Globals:
  Function:
    Runtime: nodejs20.x
    CodeUri: .
    MemorySize: 1024
    Timeout: 300
    Environment:
      Variables:
        LOG_LEVEL: !Ref LogLevel
        WORKDAY_DOMAIN: ssm:/finance-agent/workday-domain
        WORKDAY_TENANT: ssm:/finance-agent/workday-tenant
        WORKDAY_CLIENT_ID: ssm:/finance-agent/workday-client-id
        WORKDAY_CLIENT_SECRET: ssm:/finance-agent/workday-client-secret
        WORKDAY_REFRESH_TOKEN: ssm:/finance-agent/workday-refresh-token
        OPENAI_API_KEY: ssm:/finance-agent/openai-api-key
        EVENT_BUS_NAME: !Ref FinanceAgentEventBus
        S3_BUCKET_NAME: !Ref FinanceAgentBucket

Resources:
  FinanceAgentEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: FinanceAgentEventBus

  FinanceAgentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub finance-agent-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  PopplerLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: poppler
      Description: Poppler PDF utilities for Lambda
      ContentUri: layers/poppler/release-x86_64.zip
      CompatibleRuntimes:
        - nodejs20.x
      CompatibleArchitectures:
        - x86_64

  FinanceAgentLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FinanceAgentLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource:
                  - arn:aws:ssm:*:*:parameter/finance-agent/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource:
                  - !GetAtt FinanceAgentEventBus.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub ${FinanceAgentBucket}/*

  WqlToEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/wqlToEvent.handler
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      Events:
        CacheSuppliersSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Description: Cache all suppliers data for daily use
            Input: !Sub |
              {
                "action": "cache_suppliers",
                "bulk": true,
                "query": "SELECT supplier, lastUpdatedDateTime, supplierStatus, allPhoneNumbers, allEmailAddresses, allAddresses FROM suppliers1 (dataSourceFilter = defaultFilter)"
              }
        EnrichInvoicesSupplierSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Description: Query Workday for OCR invoices missing supplier
            Input: !Sub |
              {
                "action": "enrich_invoice_supplier",
                "query": "SELECT workdayID, invoiceStatusAsText, OCRSupplierInvoice, supplier FROM supplierInvoices (dataSourceFilter = supplierInvoicesFilter) WHERE OCRSupplierInvoice is not empty AND supplier is empty AND isCanceled = false"
              }

  # Action: cache_suppliers
  CacheSuppliersAction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/actions/cache_suppliers.handler
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      Events:
        Trigger:
          Type: EventBridgeRule
          Properties:
            EventBusName: !Ref FinanceAgentEventBus
            Pattern:
              detail:
                action: [cache_suppliers]

  # Action: enrich_invoice_supplier
  EnrichInvoiceSupplierAction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: dist/actions/enrich_invoice_supplier.handler
      Role: !GetAtt FinanceAgentLambdaRole.Arn
      Layers:
        - !Ref PopplerLayer
      Events:
        Trigger:
          Type: EventBridgeRule
          Properties:
            EventBusName: !Ref FinanceAgentEventBus
            Pattern:
              detail:
                action: [enrich_invoice_supplier]