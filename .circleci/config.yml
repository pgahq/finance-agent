version: "2.1"
references:
  deploy_container_config: &deploy_container_config
    docker:
      - image: cimg/node:20.11.0
    working_directory: ~/app
    steps:
      - attach_workspace:
          at: ~/app
      - restore_cache:
          name: Load cached production dependencies
          keys:
            - prod-dependency-cache-{{ checksum "package-lock.json" }}
            - prod-dependency-cache-
      - run:
          name: Install production dependencies
          command: npm ci --production
      - save_cache:
          name: Cache production dependencies
          key: prod-dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules
      - run:
          name: Install AWS CLI
          command: |
            cd
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
      - run:
          name: Package and upload lambda code
          command: >
            aws cloudformation package
            --template-file template.yml
            --s3-bucket $AWS_ARTIFACT_BUCKET
            --s3-prefix $CIRCLE_PROJECT_REPONAME
            --output-template-file packaged.yml
      - run:
          name: Deploy CloudFormation template to AWS
          command: >
            aws cloudformation deploy
            --template-file packaged.yml
            --stack-name $CIRCLE_PROJECT_REPONAME
            --capabilities CAPABILITY_IAM
            --region us-east-1
            --role-arn $AWS_DEPLOY_ROLE_ARN
            --parameter-overrides
            LogLevel=$LOG_LEVEL
            WorkdayDomain=$WORKDAY_DOMAIN
            WorkdayTenant=$WORKDAY_TENANT
            FallbackFundId=$FALLBACK_FUND_ID
            FallbackPaymentTermsId=$FALLBACK_PAYMENT_TERMS_ID
            FallbackCostCenterId=$FALLBACK_COST_CENTER_ID
            InvoiceModEnabled=$INVOICE_MOD_ENABLED
            DefaultOcrSpendCategoryId=$FALLBACK_SPEND_CATEGORY_ID

jobs:
  build:
    working_directory: ~/app
    docker:
      - image: cimg/node:20.11.0
    steps:
      - checkout
      - restore_cache:
          name: Load cached dependencies
          keys:
            - dev-dependency-cache-{{ checksum "package.json" }}
            - dev-dependency-cache-
      - run:
          name: Install dependencies
          command: npm install
      - save_cache:
          name: Cache dependencies
          key: dev-dependency-cache-{{ checksum "package.json" }}
          paths:
            - ./node_modules
      - run:
          name: Run tests
          environment:
            JEST_JUNIT_OUTPUT_DIR: reports
            RUN_EVALS: "0"
          command: |
            if [ "$CIRCLE_BRANCH" = "sandbox" ]; then
              RUN_EVALS=0 npm run test:coverage -- --ci --reporters=default --reporters=jest-junit --testPathIgnorePatterns=evals/run- || true
            else
              RUN_EVALS=0 npm run test:coverage -- --ci --reporters=default --reporters=jest-junit --testPathIgnorePatterns=evals/run-
            fi
      - store_test_results:
          path: reports
      - store_artifacts:
          path: reports
      - run:
          name: Build TypeScript
          command: npm run build
      - persist_to_workspace:
          root: ~/app
          paths:
            - dist
            - package.json
            - package-lock.json
            - template.yml
            - layers

  deploy-to-dev:
    <<: *deploy_container_config
    environment:
      LOG_LEVEL: DEBUG
      WORKDAY_DOMAIN: wd2-impl-services1.workday.com
      WORKDAY_TENANT: pgahq
      FALLBACK_FUND_ID: FUND-General_Fund_Unrestricted
      FALLBACK_PAYMENT_TERMS_ID: Net_60
      FALLBACK_COST_CENTER_ID: CC0000
      INVOICE_MOD_ENABLED: "true"
      FALLBACK_SPEND_CATEGORY_ID: Default_OCR_Spend_Category

  deploy-to-prod:
    <<: *deploy_container_config
    environment:
      LOG_LEVEL: DEBUG
      WORKDAY_DOMAIN: services1.myworkday.com
      WORKDAY_TENANT: pgahq
      FALLBACK_FUND_ID: ""
      FALLBACK_PAYMENT_TERMS_ID: ""
      FALLBACK_COST_CENTER_ID: ""
      INVOICE_MOD_ENABLED: "false"
      FALLBACK_SPEND_CATEGORY_ID: ""

  eval:
    working_directory: ~/app
    docker:
      - image: cimg/node:20.11.0
        environment:
          RUN_EVALS: "1"
          EVALS_API_KEY: $EVALS_API_KEY
          EVAL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_agent_eval
      - image: pgvector/pgvector:pg15
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_agent_eval
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Wait for Postgres
          command: |
            sudo apt-get update && sudo apt-get install -y postgresql-client
            for i in $(seq 1 30); do
              pg_isready -h localhost -p 5432 -U postgres && break
              sleep 1
            done
      - run:
          name: Run evals when AI paths change
          environment:
            JEST_JUNIT_OUTPUT_DIR: reports
          command: |
            chmod +x evals/should-run-eval.sh
            if ! evals/should-run-eval.sh; then
              echo "Skipping live evals (no AI-related diff)"
              exit 0
            fi
            if [ -z "$EVALS_API_KEY" ]; then
              echo "EVALS_API_KEY is not set in the chatbot-development CircleCI context"
              exit 1
            fi
            npm run eval:seed
            RUN_EVALS=1 npx jest --runInBand --forceExit --testTimeout=180000 evals/run-validation-field.test.ts || exit 1
            RUN_EVALS=1 npx jest --runInBand --forceExit --testTimeout=180000 evals/run-invoice-line-merge.test.ts || exit 1
            RUN_EVALS=1 npx jest --runInBand --forceExit --testTimeout=180000 evals/run-supplier-rag.test.ts || exit 1
      - store_test_results:
          path: reports
          when: always

workflows:
  version: 2
  build-deploy:
    jobs:
      - build
      - eval:
          context: chatbot-development
      - deploy-to-dev:
          context: chatbot-development
          requires:
            - build
            - eval
          filters:
            branches:
              only: development
      - deploy-to-prod:
          context: chatbot-production
          requires:
            - build
            - eval
          filters:
            branches:
              only: main
